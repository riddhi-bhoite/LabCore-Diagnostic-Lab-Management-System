<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LabCore — My Bookings</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--navy:#0d1e35;--blue:#1a3a6b;--accent:#3b82f6;--gold:#f0a500;--surface:#f0f4fb;--white:#fff;--muted:#94a3b8;--border:#dde3ef;--ink:#0f172a;--ok:#16a34a;--err:#dc2626}
    body{font-family:'Sora',sans-serif;background:var(--surface);color:var(--ink);min-height:100vh}
    nav{background:var(--navy);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:62px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.25)}
    .brand{display:flex;align-items:center;gap:.7rem;text-decoration:none}
    .brand-mark{width:38px;height:38px;background:linear-gradient(135deg,var(--gold),#f97316);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.15rem}
    .brand-name{font-family:'Playfair Display',serif;font-size:1.4rem;color:#fff}.brand-name b{color:var(--gold)}
    .nav-back{color:rgba(255,255,255,.7);font-size:.85rem;text-decoration:none}
    .nav-back:hover{color:#fff}
    .main{max-width:1000px;margin:0 auto;padding:2rem 1.5rem}
    .page-head{margin-bottom:1.8rem;animation:fadeUp .5s ease both;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
    .page-head h1{font-family:'Playfair Display',serif;font-size:1.9rem}
    .btn-new{display:flex;align-items:center;gap:.5rem;padding:.7rem 1.3rem;background:linear-gradient(135deg,var(--blue),var(--accent));color:#fff;border:none;border-radius:10px;font-family:'Sora',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;text-decoration:none;transition:all .2s}
    .btn-new:hover{opacity:.9;transform:translateY(-1px)}

    /* FILTER TABS */
    .filter-tabs{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap;animation:fadeUp .5s ease both .1s}
    .tab{padding:.45rem 1.1rem;border-radius:50px;font-size:.82rem;font-weight:600;border:1.5px solid var(--border);color:var(--muted);background:var(--white);cursor:pointer;transition:all .2s}
    .tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .tab:hover:not(.active){border-color:var(--accent);color:var(--accent)}

    /* TABLE CARD */
    .card{background:var(--white);border-radius:18px;box-shadow:0 2px 16px rgba(15,23,42,.07);overflow:hidden;animation:fadeUp .6s ease both .15s}
    table{width:100%;border-collapse:collapse}
    thead{background:#f8fafc}
    th{padding:.9rem 1.2rem;text-align:left;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);white-space:nowrap}
    td{padding:.9rem 1.2rem;font-size:.88rem;border-top:1px solid #f1f5f9;vertical-align:middle}
    tr:hover td{background:#fafbfc}
    .badge{padding:.25rem .75rem;border-radius:50px;font-size:.72rem;font-weight:700}
    .badge-pending{background:#fef9c3;color:#854d0e}
    .badge-confirmed{background:#dbeafe;color:#1e40af}
    .badge-completed{background:#dcfce7;color:#166534}
    .badge-cancelled{background:#fee2e2;color:#991b1b}
    .pay-badge-unpaid{background:#fee2e2;color:#991b1b;padding:.2rem .65rem;border-radius:50px;font-size:.7rem;font-weight:700}
    .pay-badge-paid{background:#dcfce7;color:#166534;padding:.2rem .65rem;border-radius:50px;font-size:.7rem;font-weight:700}
    .action-btn{padding:.3rem .8rem;border-radius:8px;font-size:.78rem;font-weight:600;text-decoration:none;border:1.5px solid;cursor:pointer;background:transparent;font-family:'Sora',sans-serif;transition:all .2s;display:inline-block;margin-right:.3rem}
    .action-btn.view{border-color:var(--accent);color:var(--accent)}.action-btn.view:hover{background:var(--accent);color:#fff}
    .action-btn.pay{border-color:var(--ok);color:var(--ok)}.action-btn.pay:hover{background:var(--ok);color:#fff}
    .action-btn.cancel{border-color:var(--err);color:var(--err)}.action-btn.cancel:hover{background:var(--err);color:#fff}
    .empty-state{text-align:center;padding:3rem;color:var(--muted)}
    .empty-state .ei{font-size:2.5rem;margin-bottom:.75rem}
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @media(max-width:700px){.hide-mobile{display:none}td,th{padding:.7rem .8rem}}
  </style>
</head>
<body>
<nav>
  <a href="patient-dashboard.html" class="brand"><div class="brand-mark">🧬</div><span class="brand-name">Lab<b>Core</b></span></a>
  <a href="patient-dashboard.html" class="nav-back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-head">
    <h1>My Bookings</h1>
    <a href="book-appointment.html" class="btn-new">+ New Appointment</a>
  </div>

  <div class="filter-tabs">
    <div class="tab active" onclick="filterBookings('All',this)">All</div>
    <div class="tab" onclick="filterBookings('Pending',this)">Pending</div>
    <div class="tab" onclick="filterBookings('Confirmed',this)">Confirmed</div>
    <div class="tab" onclick="filterBookings('Completed',this)">Completed</div>
    <div class="tab" onclick="filterBookings('Cancelled',this)">Cancelled</div>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>#ID</th>
          <th>Date</th>
          <th>Doctor</th>
          <th class="hide-mobile">Tests</th>
          <th>Amount</th>
          <th>Status</th>
          <th>Payment</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="bookingsTbody">
        <tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--muted)">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  let allBookings = [];

  function badgeCls(s){return{Pending:'badge-pending',Confirmed:'badge-confirmed',Completed:'badge-completed',Cancelled:'badge-cancelled'}[s]||'badge-pending'}

  function renderTable(list) {
    const tbody = document.getElementById('bookingsTbody');
    if (!list.length) {
      tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="ei">📭</div>No bookings found.</div></td></tr>`;
      return;
    }
    tbody.innerHTML = list.map(b => `
      <tr>
        <td><strong>#${b.booking_id}</strong></td>
        <td>${b.booking_date}</td>
        <td>Dr. ${b.doctor_name}<br><small style="color:var(--muted)">${b.specialization}</small></td>
        <td class="hide-mobile">${b.test_count} test(s)</td>
        <td>₹${parseFloat(b.total_amount).toFixed(2)}</td>
        <td><span class="badge ${badgeCls(b.booking_status)}">${b.booking_status}</span></td>
        <td><span class="${b.payment_status==='Paid'?'pay-badge-paid':'pay-badge-unpaid'}">${b.payment_status}</span></td>
        <td>
          ${b.booking_status==='Completed'?`<a href="my-reports.html?booking=${b.booking_id}" class="action-btn view">Report</a>`:''}
          ${b.payment_status!=='Paid'&&b.booking_status!=='Cancelled'?`<a href="payment.html?booking=${b.booking_id}" class="action-btn pay">Pay</a>`:''}
          ${b.booking_status==='Pending'?`<button class="action-btn cancel" onclick="cancelBooking(${b.booking_id})">Cancel</button>`:''}
        </td>
      </tr>`).join('');
  }

  function filterBookings(status, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderTable(status === 'All' ? allBookings : allBookings.filter(b => b.booking_status === status));
  }

  async function cancelBooking(id) {
    if (!confirm('Cancel this booking?')) return;
    const res  = await fetch('../api/cancel-booking.php', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({booking_id:id}) });
    const data = await res.json();
    if (data.success) loadBookings();
  }

  async function loadBookings() {
    try {
      const res  = await fetch('../api/my-bookings.php');
      const data = await res.json();
      if (!data.success) { window.location.href = 'login.html'; return; }
      allBookings = data.bookings || [];
      renderTable(allBookings);
    } catch(e) {
      document.getElementById('bookingsTbody').innerHTML = `<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--err)">Failed to load bookings.</td></tr>`;
    }
  }

  loadBookings();
</script>
</body>
</html>
