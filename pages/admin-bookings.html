<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>LabCore — All Bookings</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--navy:#0d1e35;--blue:#1a3a6b;--accent:#3b82f6;--gold:#f0a500;--gold-lit:#fbbf24;--surface:#f0f4fb;--white:#fff;--muted:#94a3b8;--border:#dde3ef;--ink:#0f172a;--ok:#16a34a;--err:#dc2626;--warn:#d97706}
    body{font-family:'Sora',sans-serif;background:var(--surface);color:var(--ink);min-height:100vh}
    nav{background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:62px;position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,.3)}
    .brand{display:flex;align-items:center;gap:.7rem;text-decoration:none}
    .brand-mark{width:38px;height:38px;background:linear-gradient(135deg,var(--gold),#f97316);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.15rem}
    .brand-name{font-family:'Playfair Display',serif;font-size:1.4rem;color:#fff}.brand-name b{color:var(--gold)}
    .nav-links{display:flex;gap:.2rem}
    .nav-link{padding:.42rem .85rem;border-radius:8px;color:rgba(255,255,255,.6);font-size:.82rem;font-weight:500;text-decoration:none;transition:all .2s}
    .nav-link:hover,.nav-link.active{background:rgba(255,255,255,.12);color:#fff}
    .nav-right{display:flex;align-items:center;gap:.75rem}
    .admin-badge{background:rgba(240,165,0,.18);border:1px solid rgba(240,165,0,.4);color:var(--gold-lit);font-size:.72rem;font-weight:700;padding:.22rem .7rem;border-radius:50px}
    .btn-logout{padding:.36rem .85rem;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:8px;font-family:'Sora',sans-serif;font-size:.8rem;cursor:pointer;transition:background .2s}
    .btn-logout:hover{background:rgba(255,255,255,.2)}
    .main{max-width:1200px;margin:0 auto;padding:2rem 1.5rem}
    .page-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1.8rem;animation:fadeUp .5s ease both}
    .page-head h1{font-family:'Playfair Display',serif;font-size:1.85rem}
    .page-head p{color:var(--muted);font-size:.88rem;margin-top:.2rem}
    .filter-row{display:flex;gap:.75rem;margin-bottom:1.2rem;flex-wrap:wrap;animation:fadeUp .5s ease both .1s;align-items:center}
    .tab{padding:.42rem 1rem;border-radius:50px;font-size:.8rem;font-weight:600;border:1.5px solid var(--border);color:var(--muted);background:var(--white);cursor:pointer;transition:all .2s}
    .tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .tab:hover:not(.active){border-color:var(--accent);color:var(--accent)}
    .search-wrap{position:relative;margin-left:auto}
    .search-icon{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);font-size:.9rem;opacity:.4;pointer-events:none}
    .search-input{padding:.52rem .9rem .52rem 2.4rem;border:1.5px solid var(--border);border-radius:9px;font-family:'Sora',sans-serif;font-size:.84rem;color:var(--ink);background:var(--white);outline:none;width:220px;transition:all .2s}
    .search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
    .card{background:var(--white);border-radius:18px;box-shadow:0 2px 16px rgba(15,23,42,.07);overflow:hidden;animation:fadeUp .6s ease both .15s}
    table{width:100%;border-collapse:collapse}
    thead{background:#f8fafc}
    th{padding:.8rem 1.1rem;text-align:left;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);white-space:nowrap}
    td{padding:.82rem 1.1rem;font-size:.86rem;border-top:1px solid #f1f5f9;vertical-align:middle}
    tr:hover td{background:#fafbfc}
    .badge{padding:.22rem .65rem;border-radius:50px;font-size:.68rem;font-weight:700}
    .badge-pending{background:#fef9c3;color:#854d0e}.badge-confirmed{background:#dbeafe;color:#1e40af}
    .badge-completed{background:#dcfce7;color:#166534}.badge-cancelled{background:#fee2e2;color:#991b1b}
    .badge-paid{background:#dcfce7;color:#166534}.badge-unpaid{background:#fee2e2;color:#991b1b}.badge-partial{background:#fef9c3;color:#854d0e}
    .tbl-btn{padding:.26rem .7rem;border-radius:7px;font-size:.74rem;font-weight:600;border:1.5px solid;background:transparent;cursor:pointer;font-family:'Sora',sans-serif;transition:all .2s;margin-right:.25rem}
    .tbl-btn.confirm{border-color:var(--ok);color:var(--ok)}.tbl-btn.confirm:hover{background:var(--ok);color:#fff}
    .tbl-btn.cancel{border-color:var(--err);color:var(--err)}.tbl-btn.cancel:hover{background:var(--err);color:#fff}
    .empty-state{text-align:center;padding:3rem;color:var(--muted);font-size:.88rem}
    .toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1e293b;color:#fff;padding:.85rem 1.3rem;border-radius:12px;font-size:.87rem;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.25);display:none;align-items:center;gap:.6rem;z-index:999}
    .toast.show{display:flex}.toast.ok{border-left:4px solid var(--ok)}.toast.err{border-left:4px solid var(--err)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @media(max-width:800px){.nav-links{display:none}.hide-m{display:none}}
  </style>
</head>
<body>
<nav>
  <a href="admin-dashboard.html" class="brand"><div class="brand-mark">🧬</div><span class="brand-name">Lab<b>Core</b></span></a>
  <div class="nav-links">
    <a href="admin-dashboard.html" class="nav-link">Dashboard</a>
    <a href="admin-bookings.html" class="nav-link active">Bookings</a>
    <a href="admin-doctors.html" class="nav-link">Doctors</a>
    <a href="admin-tests.html" class="nav-link">Tests</a>
    <a href="admin-patients.html" class="nav-link">Patients</a>
    <a href="admin-technicians.html" class="nav-link">Lab Staff</a>
    <a href="admin-reports.html" class="nav-link">Reports</a>
  </div>
  <div class="nav-right">
    <span class="admin-badge">⚙️ Admin</span>
    <button class="btn-logout" id="logoutBtn">Sign Out</button>
  </div>
</nav>

<div class="main">
  <div class="page-head">
    <div><h1>📋 All Bookings</h1><p>View and manage every patient booking.</p></div>
  </div>
  <div class="filter-row">
    <div class="tab active" onclick="filterStatus('All',this)">All</div>
    <div class="tab" onclick="filterStatus('Pending',this)">Pending</div>
    <div class="tab" onclick="filterStatus('Confirmed',this)">Confirmed</div>
    <div class="tab" onclick="filterStatus('Completed',this)">Completed</div>
    <div class="tab" onclick="filterStatus('Cancelled',this)">Cancelled</div>
    <div class="search-wrap"><span class="search-icon">🔍</span><input class="search-input" id="searchInput" placeholder="Search patient/doctor…" oninput="filterTable()"/></div>
  </div>
  <div class="card">
    <table>
      <thead><tr><th>#ID</th><th>Patient</th><th>Doctor</th><th class="hide-m">Date</th><th class="hide-m">Tests</th><th>Amount</th><th>Status</th><th>Payment</th><th>Actions</th></tr></thead>
      <tbody id="bookingsTbody"><tr><td colspan="9" class="empty-state">Loading…</td></tr></tbody>
    </table>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
  let allBookings=[], currentStatus='All';
  document.getElementById('logoutBtn').addEventListener('click',async()=>{await fetch('../api/logout.php',{method:'POST'});sessionStorage.clear();window.location.href='login.html'});
  function showToast(msg,type='ok'){const t=document.getElementById('toast');t.textContent=(type==='ok'?'✅ ':'❌ ')+msg;t.className=`toast show ${type}`;setTimeout(()=>t.classList.remove('show'),3000)}
  function badgeCls(s){return{Pending:'badge-pending',Confirmed:'badge-confirmed',Completed:'badge-completed',Cancelled:'badge-cancelled'}[s]||'badge-pending'}
  function payBadge(s){return{Paid:'badge-paid',Unpaid:'badge-unpaid',Partial:'badge-partial'}[s]||'badge-unpaid'}

  function filterStatus(s,el){currentStatus=s;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');filterTable()}
  function filterTable(){
    const q=document.getElementById('searchInput').value.toLowerCase();
    let list=allBookings;
    if(currentStatus!=='All') list=list.filter(b=>b.booking_status===currentStatus);
    if(q) list=list.filter(b=>(b.patient_name+b.doctor_name).toLowerCase().includes(q));
    renderTable(list);
  }

  function renderTable(list){
    const tbody=document.getElementById('bookingsTbody');
    if(!list.length){tbody.innerHTML=`<tr><td colspan="9" class="empty-state">No bookings found.</td></tr>`;return}
    tbody.innerHTML=list.map(b=>`
      <tr>
        <td><strong>#${b.booking_id}</strong></td>
        <td>${b.patient_name}</td>
        <td>Dr. ${b.doctor_name}</td>
        <td class="hide-m" style="color:var(--muted)">${b.booking_date}</td>
        <td class="hide-m">${b.test_count} test(s)</td>
        <td>₹${parseFloat(b.total_amount).toFixed(2)}</td>
        <td><span class="badge ${badgeCls(b.booking_status)}">${b.booking_status}</span></td>
        <td><span class="badge ${payBadge(b.payment_status)}">${b.payment_status}</span></td>
        <td>
          ${b.booking_status==='Pending'?`<button class="tbl-btn confirm" onclick="updateStatus(${b.booking_id},'Confirmed')">Confirm</button>`:''}
          ${b.booking_status==='Pending'||b.booking_status==='Confirmed'?`<button class="tbl-btn cancel" onclick="updateStatus(${b.booking_id},'Cancelled')">Cancel</button>`:''}
        </td>
      </tr>`).join('')
  }

  async function updateStatus(id,status){
    const res=await fetch('../api/admin-update-booking.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({booking_id:id,status})});
    const data=await res.json();
    if(data.success){showToast(`Booking ${status.toLowerCase()}.`);loadBookings()}else showToast(data.message||'Failed.','err')
  }

  async function loadBookings(){
    try{const res=await fetch('../api/admin-get-bookings.php');const data=await res.json();
    if(!data.success){window.location.href='login.html';return}allBookings=data.bookings;filterTable()}
    catch(e){document.getElementById('bookingsTbody').innerHTML=`<tr><td colspan="9" class="empty-state">Failed to load.</td></tr>`}
  }
  loadBookings();
</script>
</body>
</html>
