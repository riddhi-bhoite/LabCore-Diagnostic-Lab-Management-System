<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>LabCore — Reports</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--navy:#0d1e35;--blue:#1a3a6b;--accent:#3b82f6;--gold:#f0a500;--gold-lit:#fbbf24;--surface:#f0f4fb;--white:#fff;--muted:#94a3b8;--border:#dde3ef;--ink:#0f172a;--ok:#16a34a;--err:#dc2626;--warn:#d97706;--purple:#7c3aed}
    body{font-family:'Sora',sans-serif;background:var(--surface);color:var(--ink);min-height:100vh}
    nav{background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:62px;position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,.3)}
    .brand{display:flex;align-items:center;gap:.7rem;text-decoration:none}
    .brand-mark{width:38px;height:38px;background:linear-gradient(135deg,var(--gold),#f97316);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.15rem}
    .brand-name{font-family:'Playfair Display',serif;font-size:1.4rem;color:#fff}.brand-name b{color:var(--gold)}
    .nav-links{display:flex;gap:.2rem}
    .nav-link{padding:.42rem .85rem;border-radius:8px;color:rgba(255,255,255,.6);font-size:.82rem;font-weight:500;text-decoration:none;transition:all .2s}
    .nav-link:hover,.nav-link.active{background:rgba(255,255,255,.12);color:#fff}
    .nav-right{display:flex;align-items:center;gap:.75rem}
    .admin-badge{background:rgba(240,165,0,.18);border:1px solid rgba(240,165,0,.4);color:var(--gold-lit);font-size:.72rem;font-weight:700;padding:.22rem .7rem;border-radius:50px}
    .btn-logout{padding:.36rem .85rem;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:8px;font-family:'Sora',sans-serif;font-size:.8rem;cursor:pointer;transition:background .2s}
    .btn-logout:hover{background:rgba(255,255,255,.2)}
    .main{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}
    .page-head{margin-bottom:1.8rem;animation:fadeUp .5s ease both}
    .page-head h1{font-family:'Playfair Display',serif;font-size:1.85rem}
    .page-head p{color:var(--muted);font-size:.88rem;margin-top:.2rem}
    .filter-row{display:flex;gap:.6rem;margin-bottom:1.2rem;flex-wrap:wrap;animation:fadeUp .5s ease both .1s}
    .tab{padding:.42rem 1rem;border-radius:50px;font-size:.8rem;font-weight:600;border:1.5px solid var(--border);color:var(--muted);background:var(--white);cursor:pointer;transition:all .2s}
    .tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .tab:hover:not(.active){border-color:var(--accent);color:var(--accent)}
    .card{background:var(--white);border-radius:18px;box-shadow:0 2px 16px rgba(15,23,42,.07);overflow:hidden;animation:fadeUp .6s ease both .15s}
    table{width:100%;border-collapse:collapse}
    thead{background:#f8fafc}
    th{padding:.8rem 1.2rem;text-align:left;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);white-space:nowrap}
    td{padding:.85rem 1.2rem;font-size:.86rem;border-top:1px solid #f1f5f9;vertical-align:middle}
    tr:hover td{background:#fafbfc}
    .badge{padding:.22rem .7rem;border-radius:50px;font-size:.7rem;font-weight:700}
    .badge-pending{background:#fef9c3;color:#854d0e}.badge-ready{background:#dcfce7;color:#166534}.badge-approved{background:#ede9fe;color:#5b21b6}
    .tbl-btn{padding:.28rem .75rem;border-radius:7px;font-size:.76rem;font-weight:600;border:1.5px solid;background:transparent;cursor:pointer;font-family:'Sora',sans-serif;transition:all .2s;margin-right:.3rem}
    .tbl-btn.view{border-color:var(--accent);color:var(--accent)}.tbl-btn.view:hover{background:var(--accent);color:#fff}
    .tbl-btn.approve{border-color:var(--ok);color:var(--ok)}.tbl-btn.approve:hover{background:var(--ok);color:#fff}
    .empty-state{text-align:center;padding:3rem;color:var(--muted);font-size:.88rem}
    /* DETAIL MODAL */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(8,15,26,.6);z-index:500;align-items:center;justify-content:center;padding:1rem}
    .modal-bg.open{display:flex}
    .modal{background:#fff;border-radius:20px;padding:2rem;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.25);animation:fadeUp .3s ease}
    .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem}
    .modal-head h3{font-family:'Playfair Display',serif;font-size:1.2rem}
    .modal-close{background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--muted)}
    .detail-meta{background:#f8fafc;border-radius:10px;padding:1rem;margin-bottom:1.2rem;font-size:.85rem;display:flex;flex-direction:column;gap:.35rem;color:var(--muted)}
    .detail-meta strong{color:var(--ink)}
    .result-row{display:flex;align-items:center;justify-content:space-between;padding:.55rem 0;border-bottom:1px solid #f1f5f9;font-size:.86rem}
    .result-row:last-child{border:none}
    .r-name{font-weight:500}
    .r-right{display:flex;align-items:center;gap:.6rem}
    .i-normal{color:var(--ok);font-size:.72rem;font-weight:700}.i-abnormal{color:var(--warn);font-size:.72rem;font-weight:700}.i-critical{color:var(--err);font-size:.72rem;font-weight:700}
    .modal-footer{margin-top:1.2rem;display:flex;gap:.75rem}
    .btn-close-modal{flex:1;padding:.82rem;background:transparent;border:1.5px solid var(--border);border-radius:10px;font-family:'Sora',sans-serif;font-size:.9rem;font-weight:500;color:#475569;cursor:pointer}
    .btn-approve-modal{flex:2;padding:.82rem;background:linear-gradient(135deg,#059669,#10b981);color:#fff;border:none;border-radius:10px;font-family:'Sora',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s}
    .btn-approve-modal:hover{opacity:.9}.btn-approve-modal:disabled{opacity:.5;cursor:not-allowed}
    .toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1e293b;color:#fff;padding:.85rem 1.3rem;border-radius:12px;font-size:.87rem;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.25);display:none;align-items:center;gap:.6rem;z-index:999}
    .toast.show{display:flex}.toast.ok{border-left:4px solid var(--ok)}.toast.err{border-left:4px solid var(--err)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @media(max-width:700px){.nav-links{display:none}.hide-m{display:none}}
  </style>
</head>
<body>
<nav>
  <a href="admin-dashboard.html" class="brand"><div class="brand-mark">🧬</div><span class="brand-name">Lab<b>Core</b></span></a>
  <div class="nav-links">
    <a href="admin-dashboard.html" class="nav-link">Dashboard</a>
    <a href="admin-bookings.html" class="nav-link">Bookings</a>
    <a href="admin-doctors.html" class="nav-link">Doctors</a>
    <a href="admin-tests.html" class="nav-link">Tests</a>
    <a href="admin-patients.html" class="nav-link">Patients</a>
    <a href="admin-technicians.html" class="nav-link">Lab Staff</a>
    <a href="admin-reports.html" class="nav-link active">Reports</a>
  </div>
  <div class="nav-right">
    <span class="admin-badge">⚙️ Admin</span>
    <button class="btn-logout" id="logoutBtn">Sign Out</button>
  </div>
</nav>
<div class="main">
  <div class="page-head"><h1>📄 Test Reports</h1><p>View, review and approve patient test reports.</p></div>
  <div class="filter-row">
    <div class="tab active" onclick="filterStatus('All',this)">All</div>
    <div class="tab" onclick="filterStatus('Pending',this)">Pending</div>
    <div class="tab" onclick="filterStatus('Ready',this)">Ready for Approval</div>
    <div class="tab" onclick="filterStatus('Approved',this)">Approved</div>
  </div>
  <div class="card">
    <table>
      <thead><tr><th>Report #</th><th>Patient</th><th class="hide-m">Doctor</th><th class="hide-m">Generated</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody id="reportsTbody"><tr><td colspan="6" class="empty-state">Loading…</td></tr></tbody>
    </table>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-bg" id="reportModal">
  <div class="modal">
    <div class="modal-head"><h3>📄 Report Details</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="detail-meta" id="reportMeta"></div>
    <div id="reportResults"></div>
    <div class="modal-footer">
      <button class="btn-close-modal" onclick="closeModal()">Close</button>
      <button class="btn-approve-modal" id="approveBtn" onclick="approveReport()">✅ Approve Report</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
  let allReports=[], currentStatus='All', currentReportId=null;
  document.getElementById('logoutBtn').addEventListener('click',async()=>{await fetch('../api/logout.php',{method:'POST'});sessionStorage.clear();window.location.href='login.html'});
  function showToast(msg,type='ok'){const t=document.getElementById('toast');t.textContent=(type==='ok'?'✅ ':'❌ ')+msg;t.className=`toast show ${type}`;setTimeout(()=>t.classList.remove('show'),3000)}
  function badgeCls(s){return{Pending:'badge-pending',Ready:'badge-ready',Approved:'badge-approved'}[s]||'badge-pending'}
  function interpCls(s){return{Normal:'i-normal',Abnormal:'i-abnormal',Critical:'i-critical'}[s]||'i-normal'}

  function filterStatus(s,el){currentStatus=s;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderTable(currentStatus==='All'?allReports:allReports.filter(r=>r.report_status===currentStatus))}

  function renderTable(list){
    const tbody=document.getElementById('reportsTbody');
    if(!list.length){tbody.innerHTML=`<tr><td colspan="6" class="empty-state">No reports found.</td></tr>`;return}
    tbody.innerHTML=list.map(r=>`
      <tr>
        <td><strong>#${r.report_id}</strong></td>
        <td>${r.patient_name}</td>
        <td class="hide-m">Dr. ${r.doctor_name}</td>
        <td class="hide-m" style="color:var(--muted)">${r.generated_date}</td>
        <td><span class="badge ${badgeCls(r.report_status)}">${r.report_status}</span></td>
        <td>
          <button class="tbl-btn view" onclick='viewReport(${JSON.stringify(r).replace(/'/g,"&#39;")})'>View</button>
          ${r.report_status==='Ready'?`<button class="tbl-btn approve" onclick="quickApprove(${r.report_id})">Approve</button>`:''}
        </td>
      </tr>`).join('')
  }

  function viewReport(r){
    currentReportId=r.report_id;
    document.getElementById('reportMeta').innerHTML=`
      <div><strong>Patient:</strong> ${r.patient_name}</div>
      <div><strong>Doctor:</strong> Dr. ${r.doctor_name}</div>
      <div><strong>Booking:</strong> #${r.booking_id} &nbsp;|&nbsp; <strong>Generated:</strong> ${r.generated_date}</div>
      <div><strong>Status:</strong> <span class="badge ${badgeCls(r.report_status)}" style="font-size:.72rem">${r.report_status}</span></div>`;
    document.getElementById('reportResults').innerHTML=r.details&&r.details.length?r.details.map(d=>`
      <div class="result-row">
        <span class="r-name">${d.test_name}</span>
        <div class="r-right"><span>${d.result_value} ${d.units||''}</span><span class="${interpCls(d.interpretation)}">${d.interpretation}</span></div>
      </div>`).join(''):'<p style="color:var(--muted);font-size:.85rem;text-align:center;padding:1rem">No results entered yet.</p>';
    const approveBtn=document.getElementById('approveBtn');
    approveBtn.style.display=r.report_status==='Ready'?'':'none';
    document.getElementById('reportModal').classList.add('open');
  }

  function closeModal(){document.getElementById('reportModal').classList.remove('open')}

  async function quickApprove(id){currentReportId=id;await doApprove()}
  async function approveReport(){await doApprove()}
  async function doApprove(){
    const btn=document.getElementById('approveBtn');btn.disabled=true;
    const res=await fetch('../api/admin-approve-report.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({report_id:currentReportId})});
    const data=await res.json();btn.disabled=false;
    if(data.success){closeModal();showToast('Report approved!');loadReports()}else showToast(data.message||'Failed.','err')
  }

  async function loadReports(){
    try{const res=await fetch('../api/admin-get-reports.php');const data=await res.json();
    if(!data.success){window.location.href='login.html';return}allReports=data.reports;filterStatus(currentStatus,document.querySelector('.tab.active'))}
    catch(e){document.getElementById('reportsTbody').innerHTML=`<tr><td colspan="6" class="empty-state">Failed to load.</td></tr>`}
  }
  loadReports();
</script>
</body>
</html>
